# ─────────────────────────────────────────────────────────────────────────────
#  GitHub Pages — Live Preview
#
#  Builds the React app with Vite and deploys to:
#  https://felipeassislara170.github.io/alma.app.oficial/
#
#  One-time setup (do this once in the GitHub UI):
#    Repository → Settings → Pages → Source → "GitHub Actions"
#
#  After that, every push to main automatically updates the live preview.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # configure-pages provides the correct sub-path for the repo
      - name: Setup Pages
        uses: actions/configure-pages@v5
        id: pages

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # e.g. /alma.app.oficial — Vite uses this as the asset base path
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the compiled output, not the raw source
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
