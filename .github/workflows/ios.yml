# ─────────────────────────────────────────────────────────────────────────────
# iOS Build & TestFlight Upload — Automatic Signing via ASC API
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID      – Team ID (J9U729KYR7)
#   ASC_KEY_ID         – App Store Connect API Key ID
#   ASC_ISSUER_ID      – App Store Connect Issuer ID (UUID)
#   ASC_API_KEY        – Contents of the .p8 file from ASC API
# ─────────────────────────────────────────────────────────────────────────────

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install App Store Connect API key
        if: github.event_name != 'pull_request'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Build (PR — no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive for App Store
        if: github.event_name != 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID \
            archive

      - name: Export IPA
        if: github.event_name != 'pull_request'
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID

      - name: Upload IPA artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Alma-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      - name: Setup Ruby
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          python3 -c "
          import json, os
          api_key = {
              'key_id': os.environ['ASC_KEY_ID'],
              'issuer_id': os.environ['ASC_ISSUER_ID'],
              'key': os.environ['ASC_API_KEY'],
              'duration': 1200,
              'in_house': False
          }
          with open('/tmp/asc_api_key.json', 'w') as f:
              json.dump(api_key, f)
          "
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name '*.ipa' | head -1)
          bundle exec fastlane run upload_to_testflight \
            ipa:"$IPA_PATH" \
            api_key_path:"/tmp/asc_api_key.json" \
            skip_waiting_for_build_processing:true
          rm -f /tmp/asc_api_key.json

      - name: Clean up API key
        if: always() && github.event_name != 'pull_request'
        run: rm -f ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 2>/dev/null || true
