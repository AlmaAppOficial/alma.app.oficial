# ─────────────────────────────────────────────────────────────────────────────
#  iOS Build & TestFlight Upload
#
#  Triggers:
#    • push to main          → build + archive + upload to TestFlight
#    • pull_request to main  → build only (no upload)
#    • manual workflow_dispatch
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    APPLE_TEAM_ID      – Team ID  (e.g. J9U729KYR7)
#    ASC_KEY_ID         – App Store Connect API Key ID  (e.g. 5YK4KQMMPA)
#    ASC_ISSUER_ID      – App Store Connect Issuer ID  (UUID)
#    ASC_API_KEY        – Contents of the AuthKey_*.p8 file (full PEM text)
# ─────────────────────────────────────────────────────────────────────────────

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      HAS_ASC_KEY: ${{ secrets.ASC_API_KEY != '' && secrets.ASC_KEY_ID != '' && secrets.ASC_ISSUER_ID != '' }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Select Xcode ──────────────────────────────────────────────────────
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── Install ASC API key for xcodebuild + altool ────────────────────
      - name: Install App Store Connect API key
        if: github.event_name != 'pull_request' && env.HAS_ASC_KEY == 'true'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

      # ── Build for PRs (unsigned, simulator) ──────────────────────────────
      - name: Build (PR — no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      # ── Archive (main push) ──────────────────────────────────────────────
      - name: Archive for App Store
        if: github.event_name != 'pull_request' && env.HAS_ASC_KEY == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID \
            archive

      # ── Export IPA ────────────────────────────────────────────────────────
      - name: Export IPA
        if: github.event_name != 'pull_request' && env.HAS_ASC_KEY == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID

      # ── Upload IPA artifact ───────────────────────────────────────────────
      - name: Upload IPA artifact
        if: github.event_name != 'pull_request' && env.HAS_ASC_KEY == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Alma-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      # ── Upload to TestFlight ──────────────────────────────────────────────
      - name: Setup Ruby
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.HAS_ASC_KEY == 'true'
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.HAS_ASC_KEY == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name '*.ipa' | head -1)
          bundle exec fastlane run upload_to_testflight \
            ipa:"$IPA_PATH" \
            api_key_path:"$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            skip_waiting_for_build_processing:true

      # ── Clean up key ──────────────────────────────────────────────────────
      - name: Clean up API key
        if: always() && github.event_name != 'pull_request'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: rm -f ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 2>/dev/null || true
