# ───────────────────────────────────────────────────────────────────────────────
# iOS Build & TestFlight — via Fastlane ci_beta lane
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID   – Team ID (J9U729KYR7)
#   ASC_KEY_ID      – App Store Connect API Key ID
#   ASC_ISSUER_ID   – App Store Connect Issuer ID (UUID)
#   ASC_API_KEY     – Contents of the .p8 file from ASC API
# ───────────────────────────────────────────────────────────────────────────────

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
      - '.github/workflows/ios.yml'
      - 'fastlane/Fastfile'
      - 'Gemfile'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build (PR — no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Setup Ruby
        if: github.event_name != 'pull_request'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Write ASC API key to file
        if: github.event_name != 'pull_request'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          echo "$ASC_API_KEY" > /tmp/asc_api_key.p8
          chmod 600 /tmp/asc_api_key.p8

      - name: Build & upload to TestFlight via Fastlane
        if: github.event_name != 'pull_request'
        env:
          ASC_KEY_FILE: /tmp/asc_api_key.p8
        run: bundle exec fastlane ios ci_beta

      - name: Clean up ASC API key
        if: always() && github.event_name != 'pull_request'
        run: rm -f /tmp/asc_api_key.p8
