# ─────────────────────────────────────────────────────────────────────────────
# iOS Build & TestFlight Upload — Fastlane with .p12 certificate
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID        – Team ID (J9U729KYR7)
#   ASC_KEY_ID           – App Store Connect API Key ID
#   ASC_ISSUER_ID        – App Store Connect Issuer ID (UUID)
#   ASC_API_KEY          – Contents of the .p8 file from ASC API
#   CERTIFICATE_BASE64   – Base64-encoded distribution .p12 certificate
#   CERTIFICATE_PASSWORD – Password for the .p12 certificate
# ─────────────────────────────────────────────────────────────────────────────

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install App Store Connect API key
        if: github.event_name != 'pull_request'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "ASC_KEY_FILE=$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Build (PR — no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Setup Ruby
        if: github.event_name != 'pull_request'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install distribution certificate
        if: github.event_name != 'pull_request'
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo -n "$CERTIFICATE_BASE64" | base64 --decode > /tmp/dist_cert.p12

          # Create the keychain that Fastlane's setup_ci expects
          security create-keychain -p "" ~/Library/Keychains/fastlane_tmp_keychain-db || true
          security set-keychain-settings -lut 21600 ~/Library/Keychains/fastlane_tmp_keychain-db
          security unlock-keychain -p "" ~/Library/Keychains/fastlane_tmp_keychain-db

          # Import certificate and allow codesign tool access
          security import /tmp/dist_cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 \
            -k ~/Library/Keychains/fastlane_tmp_keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" \
            ~/Library/Keychains/fastlane_tmp_keychain-db
          security list-keychain -d user -s ~/Library/Keychains/fastlane_tmp_keychain-db

          # Verify the identity is visible
          security find-identity -v -p codesigning ~/Library/Keychains/fastlane_tmp_keychain-db

          rm /tmp/dist_cert.p12

      - name: Build & upload to TestFlight via Fastlane
        if: github.event_name != 'pull_request'
        run: bundle exec fastlane ios ci_beta

      - name: Clean up API key
        if: always() && github.event_name != 'pull_request'
        run: rm -f ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 2>/dev/null || true
