# ─────────────────────────────────────────────────────────────────────────────
# iOS Build & TestFlight Upload — Fastlane with .p12 certificate
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID        – Team ID (J9U729KYR7)
#   ASC_KEY_ID           – App Store Connect API Key ID
#   ASC_ISSUER_ID        – App Store Connect Issuer ID (UUID)
#   ASC_API_KEY          – Contents of the .p8 file from ASC API
#   CERTIFICATE_BASE64   – Base64-encoded distribution .p12 certificate
#   CERTIFICATE_PASSWORD – Password for the .p12 certificate
# ─────────────────────────────────────────────────────────────────────────────

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'Shared/**'
      - 'Alma.App.Oficial.xcodeproj/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install App Store Connect API key
        if: github.event_name != 'pull_request'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "ASC_KEY_FILE=$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Install distribution certificate
        if: github.event_name != 'pull_request'
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          set -e

          # Decode certificate
          echo -n "$CERTIFICATE_BASE64" | base64 --decode > /tmp/dist_cert.p12

          # Use a dedicated signing keychain with a NON-EMPTY password.
          # Empty-password keychains cause security set-key-partition-list to fail
          # silently on macOS 14, leaving the private key inaccessible to codesign.
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS="gh-actions-signing"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Import certificate and grant codesign access
          security import /tmp/dist_cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set partition list (requires matching keychain password)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" \
            "$KEYCHAIN_PATH"

          # Add to user search list alongside login keychain
          # Fastlane setup_ci will also add fastlane_tmp_keychain to this list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify — output appears in the step log
          echo "=== Installed signing identities ==="
          security find-identity -v -p codesigning

          rm /tmp/dist_cert.p12

      - name: Build (PR — no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Setup Ruby
        if: github.event_name != 'pull_request'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build & upload to TestFlight via Fastlane
        if: github.event_name != 'pull_request'
        run: bundle exec fastlane ios ci_beta

      - name: Clean up API key
        if: always() && github.event_name != 'pull_request'
        run: rm -f ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 2>/dev/null || true

      - name: Clean up signing keychain
        if: always() && github.event_name != 'pull_request'
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
