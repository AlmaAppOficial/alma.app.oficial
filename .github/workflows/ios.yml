# iOS Build & TestFlight Upload
# Required Secrets: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
# BUILD_CERTIFICATE_BASE64, BUILD_CERTIFICATE_PASSWORD,
# PROVISION_PROFILE_BASE64, KEYCHAIN_PASSWORD, APPLE_TEAM_ID

name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'Shared/**'
      - '*.swift'
      - 'Alma.App.Oficial.xcodeproj/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Shared/**'
      - '*.swift'
      - 'Alma.App.Oficial.xcodeproj/**'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_SIGNING_CERTS: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.PROVISION_PROFILE_BASE64 != '' && secrets.BUILD_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' }}
      APPLE_TEAM_PRESENT: ${{ secrets.APPLE_TEAM_ID != '' }}
      HAS_TESTFLIGHT: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -resolvePackageDependencies \
            -clonedSourcePackagesDirPath $RUNNER_TEMP/spm

      - name: Install signing certificate
        if: github.event_name != 'pull_request' && env.IOS_SIGNING_CERTS == 'true' && env.APPLE_TEAM_PRESENT == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_CERTIFICATE_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$BUILD_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build (PR - no signing)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -clonedSourcePackagesDirPath $RUNNER_TEMP/spm \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Archive for App Store
        if: github.event_name != 'pull_request' && env.IOS_SIGNING_CERTS == 'true' && env.APPLE_TEAM_PRESENT == 'true'
        run: |
          xcodebuild \
            -project Alma.App.Oficial.xcodeproj \
            -scheme "Alma.App.Oficial (iOS)" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -clonedSourcePackagesDirPath $RUNNER_TEMP/spm \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            archive

      - name: Export IPA
        if: github.event_name != 'pull_request' && env.IOS_SIGNING_CERTS == 'true' && env.APPLE_TEAM_PRESENT == 'true'
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST_EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Alma.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload IPA artifact
        if: github.event_name != 'pull_request' && env.IOS_SIGNING_CERTS == 'true' && env.APPLE_TEAM_PRESENT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Alma-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30

      - name: Setup Ruby
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.HAS_TESTFLIGHT == 'true' && env.IOS_SIGNING_CERTS == 'true' && env.APPLE_TEAM_PRESENT == 'true'
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.HAS_TESTFLIGHT == 'true' && env.IOS_SIGNING_CERTS == 'true' && env.APPLE_TEAM_PRESENT == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name '*.ipa' | head -1)
          bundle exec fastlane run upload_to_testflight \
            ipa:"$IPA_PATH" \
            username:"$APPLE_ID" \
            app_specific_password:"$APPLE_APP_SPECIFIC_PASSWORD" \
            skip_waiting_for_build_processing:true

      - name: Clean up keychain
        if: always() && github.event_name != 'pull_request'
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true